<section>
  @for (item of hotels(); track $index) {
    <div class="card">
      <div class="imgbox">
        <div class="img">
          <img [src]="item.featuredImage" />
        </div>
        <div class="view-overlay">
          <span>View Rooms</span>
        </div>
      </div>
      <div class="details">
        <h2 class="title">{{ item.name }}</h2>
        <span class="caption"> {{ item.city }} </span>
      </div>
    </div>
  }
</section>
