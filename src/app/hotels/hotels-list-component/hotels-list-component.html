<section>
  @for (item of hotels(); track $index) {
    <div class="card">
          <img [src]="item.featuredImage" />
          <div class="overlay">
            <div class="info">
              <h3>{{ item.name }}</h3>
              <div class="line"></div>
              <p>
                <i class="fa-solid fa-location-dot"></i>
                {{item.address}}
              </p>
              <button>VIEW ROOMS<i class="fa-solid fa-arrow-right-long"></i></button>
            </div>
          </div>
        </div>
  }
</section>
