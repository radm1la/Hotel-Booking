<div class="booking-container">
  <div class="weather-container">
    <a
      class="weatherwidget-io"
      href="https://forecast7.com/en/41d7244d83/tbilisi/"
      data-label_1="TBILISI"
      data-label_2="WEATHER"
      data-theme="original"
      >TBILISI WEATHER</a
    >
  </div>

  <div class="booking-form-area">
    <h3>Reserve Your Stay</h3>
    <form [formGroup]="bookingForm" (ngSubmit)="submitBooking()">
      <div class="input-group">
        <label>Check-in</label>
        <input type="date" formControlName="checkInDate" [min]="today"/>
      </div>

      <div class="input-group">
        <label>Check-out</label>
        <input type="date" formControlName="checkOutDate" [min]="today"/>
      </div>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" formControlName="customerName" placeholder="Your name" />
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="text" formControlName="customerPhone" placeholder="+995..." />
      </div>

      <div class="price-display">
        <span>Total Price:</span>
        <strong>${{ totalPrice() }}</strong>
      </div>

      <button type="submit" [disabled]="bookingForm.invalid">CONFIRM BOOKING</button>
    </form>
  </div>
</div>
