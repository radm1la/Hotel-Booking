@for (item of visibleRooms(); track $index) {
  <div class="card">
    <div class="img">
      <img [src]="item.images[$index % item.images.length]?.source" />
      <span class="price"> FROM: ${{ item.pricePerNight }} / NIGHT </span>
    </div>
    <h1>{{ item.name }}</h1>
    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ut optio odit totam quo, dignissimos
      culpa.
    </p>
    <button [routerLink]="['/room',item.id]">BOOK NOW</button>
  </div>
}
<div #anchor class="scroll-anchor"></div>
