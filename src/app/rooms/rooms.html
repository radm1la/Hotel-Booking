<app-hero-component-rooms></app-hero-component-rooms>
<app-values-rooms-comp></app-values-rooms-comp>
<app-filtering-component></app-filtering-component>
<section class="rooms-list-container">
  @if (service.isLoading()) {
    <h1 class="loading_msg">
      Searching for hotels<span class="load_dots"><span>.</span><span>.</span><span>.</span></span>
    </h1>
  } @else if (service.errorMsg()) {
    <h1 class="error_msg">{{ service.errorMsg() }}</h1>
  } @else if (service.dataLoaded()) {
    <app-cards-component [roomsList]="rooms()"></app-cards-component>

    @if (rooms().length === 0) {
      <p class="no_rooms">No rooms found matching your criteria.</p>
    }
  }
</section>
