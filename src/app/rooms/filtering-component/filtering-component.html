<form>
    <div class="area">
        <label>PRICE RANGE</label>
        <mat-slider min="0" [max]="priceLimit" step="10" discrete="">
            <input matSliderStartThumb [(ngModel)]="minPrice" (ngModelChange)="validateInputs()" name="sliderMin">
            <input matSliderEndThumb [(ngModel)]="maxPrice" (ngModelChange)="validateInputs()" name="sliderMax">
        </mat-slider>

        <div class="man_inputs">
            <div class="field">
                <span>MIN</span>
                <input type="number" [(ngModel)]="minPrice" (change)="validateInputs()" name="inputMin">
            </div>
            <div class="field">
                <span>MAX</span>
                <input type="number" [(ngModel)] = "maxPrice" (change)="validateInputs()" name="inputMax">
            </div>
        </div>
    </div>
    <div class="area">
       <label for="roomType">ROOM TYPE</label>
    <select 
        id="roomType" 
        name="roomType" 
        [(ngModel)]="selectedRoomType" 
        >
        <option value="0" disabled selected>ALL ROOMS</option>
        @for (item of roomTypes(); track $index) {
            <option [value]="item.id"> {{item.name}} </option>
        }
        
    </select>
    </div>
   <div class="area">
    <label>CHECK IN</label>
    <input type="date" [(ngModel)]="checkInDate" name="checkIn" (change)="validateDates()" [min]="today">
</div>

<div class="area">
    <label>CHECK OUT</label>
    <input type="date" [(ngModel)]="checkOutDate" name="checkOut" (change)="validateDates()" [min]="today">
</div>
    <div class="area">
        <label for="guests">GUESTS</label>
    <input 
        type="number" 
        id="guests" 
        name="maximumGuests" 
        [(ngModel)]="maximumGuests" 
        min="1" 
        max="6"
        class="guest-input"
        (change)="validateGuests()">
    </div>
    <div class="buttons">
        <button type="submit" class="filter-btn">FILTER</button>
        <button type="reset" class="reset-btn">RESET</button>
    </div>
</form>
